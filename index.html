<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auditoria Logística FAMA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .loading-overlay { display: flex; justify-content: center; align-items: center; height: 100vh; background: white; position: fixed; width: 100%; z-index: 100; flex-direction: column; }
        .tab-active { background: #1e3a8a !important; color: white !important; border-radius: 12px; transform: scale(1.05); }
        .table-container { max-height: 60vh; overflow-y: auto; border-radius: 20px; }
        thead th { position: sticky; top: 0; background: #f8fafc; z-index: 10; border-bottom: 2px solid #e2e8f0; padding: 15px; font-size: 10px; color: #94a3b8; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">

    <div id="loader" class="loading-overlay">
        <div class="w-12 h-12 border-4 border-slate-200 border-t-blue-900 rounded-full animate-spin mb-4"></div>
        <p class="font-black text-blue-900 text-xs tracking-widest uppercase">Cruzando Dados do n8n...</p>
    </div>

    <div class="w-full max-w-[1700px] mx-auto p-4 md:p-6">
        
        <!-- Header -->
        <header class="flex flex-col lg:flex-row justify-between items-center mb-8 bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100">
            <div class="flex items-center gap-5">
                <div class="bg-blue-900 w-16 h-16 rounded-3xl flex items-center justify-center text-white shadow-lg shadow-blue-200">
                    <i class="fas fa-file-contract fa-2x"></i>
                </div>
                <div>
                    <h1 class="text-3xl font-black text-blue-950 tracking-tighter uppercase leading-none">Relatório Consolidado</h1>
                    <p class="text-slate-400 font-bold mt-1 text-sm">Filtros Avançados por Regras de Negócio</p>
                </div>
            </div>
            
            <div class="flex gap-10 mt-6 lg:mt-0">
                <div class="text-right">
                    <p class="text-[10px] text-slate-400 uppercase font-black tracking-widest">Peso Somado</p>
                    <p id="total-weight" class="text-3xl font-black text-blue-600">0.0 <span class="text-sm">ton</span></p>
                </div>
                <div class="text-right border-l pl-10 border-slate-100">
                    <p class="text-[10px] text-slate-400 uppercase font-black tracking-widest">Registros</p>
                    <p id="total-docs" class="text-3xl font-black text-slate-900">0</p>
                </div>
                <button onclick="window.location.reload()" class="bg-slate-950 hover:bg-blue-900 text-white w-14 h-14 rounded-2xl transition shadow-xl self-center flex items-center justify-center">
                    <i class="fas fa-sync-alt"></i>
                </button>
            </div>
        </header>

        <div class="flex flex-col lg:flex-row gap-8">
            
            <!-- Sidebar de Filtros -->
            <aside class="w-full lg:w-80 flex flex-col gap-4">
                <h3 class="font-black text-blue-900 text-xs uppercase tracking-widest ml-4">Regras de Negócio</h3>
                <div id="situation-list" class="flex flex-col gap-2">
                    <!-- Gerado dinamicamente -->
                </div>

                <hr class="my-4 border-slate-200">

                <h3 class="font-black text-blue-900 text-xs uppercase tracking-widest ml-4">Status Auditoria</h3>
                <div id="audit-filters" class="flex flex-col gap-2">
                    <button onclick="setAuditFilter('TODOS')" id="audit-todos" class="p-4 bg-white rounded-2xl shadow-sm text-left text-xs font-black hover:bg-slate-100 transition tab-active">TODOS OS DOCUMENTOS</button>
                    <button onclick="setAuditFilter('VINCULADO')" id="audit-vinculado" class="p-4 bg-white rounded-2xl shadow-sm text-left text-xs font-black hover:bg-slate-100 transition">VINCULADOS (NF + CTE)</button>
                    <button onclick="setAuditFilter('APENAS NF')" id="audit-nf" class="p-4 bg-white rounded-2xl shadow-sm text-left text-xs font-black hover:bg-slate-100 transition text-amber-600">APENAS NF (SEM FRETE)</button>
                    <button onclick="setAuditFilter('APENAS CTE')" id="audit-cte" class="p-4 bg-white rounded-2xl shadow-sm text-left text-xs font-black hover:bg-slate-100 transition text-blue-600">APENAS CTE (SEM NF)</button>
                </div>
            </aside>

            <!-- Área Principal -->
            <main class="flex-1">
                <div class="bg-white rounded-[2.5rem] shadow-2xl border border-slate-100 overflow-hidden">
                    <div class="p-8 border-b border-slate-50 flex flex-col md:flex-row justify-between items-center gap-6">
                        <div class="relative w-full">
                            <i class="fas fa-search absolute left-5 top-4.5 text-slate-300"></i>
                            <input type="text" id="searchInput" onkeyup="search()" placeholder="Buscar por Nota, Chave, Emitente ou Transportadora..." class="w-full pl-14 pr-6 py-4 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none font-bold text-sm">
                        </div>
                    </div>

                    <div class="table-container">
                        <table class="w-full text-left text-xs border-separate border-spacing-0">
                            <thead>
                                <tr class="uppercase font-black tracking-widest text-slate-400">
                                    <th class="pl-8">Operação</th>
                                    <th>NF-e</th>
                                    <th>Data</th>
                                    <th>Emitente / Destinatário</th>
                                    <th>Transportadora / CT-e</th>
                                    <th class="text-right">Peso (Kg)</th>
                                    <th class="text-right">Vlr Nota</th>
                                    <th class="text-right pr-8">Vlr Frete</th>
                                </tr>
                            </thead>
                            <tbody id="main-table-body" class="divide-y divide-slate-50"></tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        const SUB_URL = "https://pdqkvyxufnprapkgsvxx.supabase.co";
        const SUB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBkcWt2eXh1Zm5wcmFwa2dzdnh4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjMyMDE2MzAsImV4cCI6MjA3ODc3NzYzMH0.CFxmP1S8829joB6txKQ4bypp-Qr7SDHAg0P2Dgpti1k";
        const supabaseClient = window.supabase.createClient(SUB_URL, SUB_KEY);

        let allRecords = [];
        let activeSit = 'TODOS';
        let activeAudit = 'TODOS';

        async function loadData() {
            let page = 0;
            const size = 1000;
            let fetching = true;

            while (fetching) {
                const { data, error } = await supabaseClient
                    .from('relatorio_unificado')
                    .select('*')
                    .range(page * size, (page + 1) * size - 1);

                if (error || !data || data.length === 0) { fetching = false; }
                else {
                    allRecords = [...allRecords, ...data];
                    page++;
                    if (data.length < size) fetching = false;
                }
            }
            
            document.getElementById('loader').style.display = 'none';
            renderSituations();
            applyFilters();
        }

        function renderSituations() {
            const container = document.getElementById('situation-list');
            const sits = ['TODOS', ...new Set(allRecords.map(i => i.situacao))];
            
            container.innerHTML = sits.map(s => {
                const count = s === 'TODOS' ? allRecords.length : allRecords.filter(i => i.situacao === s).length;
                return `
                    <button onclick="setSitFilter('${s}')" id="sit-${s.replace(/\s+/g, '-')}" class="flex justify-between items-center p-4 bg-white rounded-2xl shadow-sm text-[10px] font-black hover:bg-slate-50 transition border-r-4 border-blue-900">
                        <span class="truncate pr-2">${s}</span>
                        <span class="bg-slate-100 px-2 py-1 rounded-lg text-slate-500">${count}</span>
                    </button>
                `;
            }).join('');
        }

        function applyFilters() {
            let data = allRecords;

            // Filtro de Situação (N8N)
            if (activeSit !== 'TODOS') {
                data = data.filter(i => i.situacao === activeSit);
            }

            // Filtro de Auditoria
            if (activeAudit !== 'TODOS') {
                data = data.filter(i => i.status_geral.includes(activeAudit));
            }

            // Atualiza UI
            document.getElementById('total-docs').innerText = data.length;
            const totalWeight = data.reduce((acc, curr) => acc + (parseFloat(curr.peso_final) || 0), 0);
            document.getElementById('total-weight').innerHTML = `${(totalWeight / 1000).toFixed(2)} <span class="text-sm font-bold">ton</span>`;

            renderTable(data);
            updateButtonStyles();
        }

        function renderTable(data) {
            const body = document.getElementById('main-table-body');
            body.innerHTML = data.map(item => `
                <tr class="hover:bg-blue-50/30 transition group">
                    <td class="p-5 pl-8">
                        <div class="text-[9px] font-black text-blue-900 bg-blue-50 px-2 py-1 rounded inline-block uppercase tracking-tighter leading-tight">${item.situacao}</div>
                        <div class="mt-1 text-[8px] font-bold text-slate-300">${item.status_geral}</div>
                    </td>
                    <td class="p-4 font-black text-slate-900 text-sm">${item.numero_nota || '---'}</td>
                    <td class="p-4 text-slate-400 font-bold">${item.data_nf || '---'}</td>
                    <td class="p-4">
                        <div class="font-bold text-slate-700 truncate max-w-[220px]">${item.emitente_nf || '---'}</div>
                        <div class="text-[10px] text-slate-400 truncate max-w-[220px]">PARA: ${item.destinatario_nf || '---'}</div>
                    </td>
                    <td class="p-4">
                        <div class="font-bold text-slate-600 truncate max-w-[180px]">${item.transportadora_nome || 'PRÓPRIO'}</div>
                        <div class="text-[9px] text-blue-400 font-mono uppercase truncate max-w-[180px]">${item.chave_cte || ''}</div>
                    </td>
                    <td class="p-4 text-right font-black text-slate-400">${Number(item.peso_final).toLocaleString('pt-BR')}</td>
                    <td class="p-4 text-right font-black text-green-600 leading-tight">R$ ${Number(item.valor_nf).toLocaleString('pt-BR', {minimumFractionDigits: 2})}</td>
                    <td class="p-4 text-right font-black text-blue-600 pr-8 leading-tight">R$ ${Number(item.valor_frete).toLocaleString('pt-BR', {minimumFractionDigits: 2})}</td>
                </tr>
            `).join('');
        }

        function setSitFilter(val) { activeSit = val; applyFilters(); }
        function setAuditFilter(val) { activeAudit = val; applyFilters(); }

        function updateButtonStyles() {
            // Limpa estilos
            document.querySelectorAll('button').forEach(b => b.classList.remove('tab-active'));
            
            // Ativa situação
            const sitId = `sit-${activeSit.replace(/\s+/g, '-')}`;
            if(document.getElementById(sitId)) document.getElementById(sitId).classList.add('tab-active');

            // Ativa auditoria
            const auditId = `audit-${activeAudit.toLowerCase().split(' ')[0]}`;
            if(document.getElementById(auditId)) document.getElementById(auditId).classList.add('tab-active');
        }

        function search() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allRecords.filter(i => 
                (i.numero_nota && i.numero_nota.toString().includes(term)) ||
                (i.emitente_nf && i.emitente_nf.toLowerCase().includes(term)) ||
                (i.transportadora_nome && i.transportadora_nome.toLowerCase().includes(term)) ||
                (i.chave_nf_referencia && i.chave_nf_referencia.includes(term))
            );
            renderTable(filtered);
        }

        loadData();
    </script>
</body>
</html>

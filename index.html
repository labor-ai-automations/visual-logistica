<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatório Unificado FAMA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .loading-overlay { display: flex; justify-content: center; align-items: center; height: 100vh; background: white; position: fixed; width: 100%; z-index: 100; }
        .tab-active { border-bottom: 3px solid #1e3a8a; color: #1e3a8a; font-weight: bold; }
        .table-container { max-height: 70vh; overflow-y: auto; }
        thead th { position: sticky; top: 0; background: #f9fafb; z-index: 10; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <div id="loader" class="loading-overlay">
        <div class="text-center">
            <i class="fas fa-circle-notch fa-spin fa-3x text-blue-900 mb-4"></i>
            <p class="text-lg font-bold">Consolidando milhares de dados...</p>
            <p id="load-count" class="text-sm text-slate-500">Iniciando...</p>
        </div>
    </div>

    <div class="w-full max-w-[1600px] mx-auto p-4">
        <header class="flex flex-col md:flex-row justify-between items-center mb-6 bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
            <div>
                <h1 class="text-2xl font-black text-blue-900">LOGÍSTICA FAMA - RELATÓRIO UNIFICADO</h1>
                <p class="text-slate-500 text-sm">Integração de Notas Fiscais e Conhecimentos de Transporte</p>
            </div>
            <div class="flex gap-4 mt-4 md:mt-0">
                <div class="text-right">
                    <p class="text-xs text-slate-400 uppercase font-bold">Total de Registros</p>
                    <p id="total-count" class="text-2xl font-black text-blue-600">0</p>
                </div>
                <button onclick="window.location.reload()" class="bg-blue-900 hover:bg-black text-white px-5 py-2 rounded-xl transition flex items-center">
                    <i class="fas fa-sync-alt mr-2"></i> Atualizar
                </button>
            </div>
        </header>

        <!-- Cards de Status -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6" id="summary-cards"></div>

        <!-- Barra de Busca e Filtros -->
        <div class="bg-white p-4 rounded-2xl shadow-sm mb-6 flex flex-col md:flex-row gap-6 justify-between items-center">
            <div class="flex gap-6 overflow-x-auto w-full md:w-auto pb-2" id="filter-tabs">
                <button onclick="filterTable('TODOS')" class="pb-2 tab-active" id="tab-todos">Todos os Registros</button>
                <button onclick="filterTable('VINCULADO')" class="pb-2 text-slate-400 hover:text-blue-900" id="tab-vinc">Vinculados (NF+CTE)</button>
                <button onclick="filterTable('APENAS NF')" class="pb-2 text-slate-400 hover:text-blue-900" id="tab-nf">Apenas NF (Falta Frete)</button>
                <button onclick="filterTable('APENAS CTE')" class="pb-2 text-slate-400 hover:text-blue-900" id="tab-cte">Apenas CTE (Falta NF)</button>
            </div>
            <div class="relative w-full md:w-96">
                <i class="fas fa-search absolute left-4 top-3.5 text-slate-300"></i>
                <input type="text" id="searchInput" onkeyup="search()" placeholder="Buscar por Nota, Chave, Emitente..." class="w-full pl-12 pr-4 py-3 bg-slate-50 border-none rounded-xl focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
        </div>

        <!-- Tabela Principal -->
        <div class="bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden">
            <div class="table-container">
                <table class="w-full text-left text-sm">
                    <thead>
                        <tr class="text-slate-400 font-bold border-b text-[11px] uppercase tracking-wider">
                            <th class="p-4">Status</th>
                            <th class="p-4">Data NF</th>
                            <th class="p-4">Nº Nota</th>
                            <th class="p-4">Emitente / Destinatário</th>
                            <th class="p-4 text-right">Valor Mercadoria</th>
                            <th class="p-4">Transportadora / CTE</th>
                            <th class="p-4 text-right">Valor Frete</th>
                            <th class="p-4">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="main-table-body" class="divide-y divide-slate-100"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const SUB_URL = "https://pdqkvyxufnprapkgsvxx.supabase.co";
        const SUB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBkcWt2eXh1Zm5wcmFwa2dzdnh4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjMyMDE2MzAsImV4cCI6MjA3ODc3NzYzMH0.CFxmP1S8829joB6txKQ4bypp-Qr7SDHAg0P2Dgpti1k";
        const supabaseClient = window.supabase.createClient(SUB_URL, SUB_KEY);

        let allRecords = [];

        async function loadAllData() {
            let page = 0;
            let pageSize = 1000;
            let keepFetching = true;

            while (keepFetching) {
                document.getElementById('load-count').innerText = `Baixando lote ${page + 1}...`;
                const { data, error } = await supabaseClient
                    .from('relatorio_unificado') // LENDO DA VIEW QUE CRIAMOS
                    .select('*')
                    .range(page * pageSize, (page + 1) * pageSize - 1);

                if (error || data.length === 0) {
                    keepFetching = false;
                } else {
                    allRecords = [...allRecords, ...data];
                    page++;
                    if (data.length < pageSize) keepFetching = false;
                }
            }
            
            document.getElementById('loader').style.display = 'none';
            document.getElementById('total-count').innerText = allRecords.length;
            renderAll();
        }

        function renderAll() {
            const body = document.getElementById('main-table-body');
            body.innerHTML = "";
            renderTable(allRecords);
            renderCards();
        }

        function renderTable(data) {
            const body = document.getElementById('main-table-body');
            body.innerHTML = data.map(item => `
                <tr class="hover:bg-slate-50 transition">
                    <td class="p-4">
                        <span class="px-3 py-1 rounded-full text-[10px] font-bold ${getStatusColor(item.status_geral)}">
                            ${item.status_geral}
                        </span>
                    </td>
                    <td class="p-4 text-slate-500">${item.data_nf || '---'}</td>
                    <td class="p-4 font-black">${item.numero_nota || '---'}</td>
                    <td class="p-4">
                        <div class="font-bold text-slate-700 truncate max-w-[200px]">${item.emitente_nf || '---'}</div>
                        <div class="text-[11px] text-slate-400 truncate max-w-[200px]">PARA: ${item.destinatario_nf || '---'}</div>
                    </td>
                    <td class="p-4 text-right font-bold text-green-600">R$ ${Number(item.valor_nf).toLocaleString('pt-BR')}</td>
                    <td class="p-4">
                        <div class="font-bold text-slate-700 truncate max-w-[200px]">${item.transportadora_nome || 'Aguardando...'}</div>
                        <div class="text-[11px] text-blue-500 font-mono">${item.chave_cte || 'CTE Pendente'}</div>
                    </td>
                    <td class="p-4 text-right font-bold text-blue-600">R$ ${Number(item.valor_frete).toLocaleString('pt-BR')}</td>
                    <td class="p-4 text-center">
                        <button class="text-slate-300 hover:text-blue-900"><i class="fas fa-ellipsis-v"></i></button>
                    </td>
                </tr>
            `).join('');
        }

        function getStatusColor(status) {
            if (status === 'VINCULADO') return 'bg-green-100 text-green-700';
            if (status.includes('Falta Frete')) return 'bg-amber-100 text-amber-700';
            return 'bg-blue-100 text-blue-700';
        }

        function filterTable(type) {
            // Remove active style from all tabs
            document.querySelectorAll('#filter-tabs button').forEach(b => b.classList.remove('tab-active', 'text-blue-900'));
            
            let filtered = [];
            if (type === 'TODOS') {
                filtered = allRecords;
                document.getElementById('tab-todos').classList.add('tab-active');
            } else {
                filtered = allRecords.filter(i => i.status_geral.includes(type));
                const tabId = type === 'VINCULADO' ? 'tab-vinc' : (type === 'APENAS NF' ? 'tab-nf' : 'tab-cte');
                document.getElementById(tabId).classList.add('tab-active');
            }
            renderTable(filtered);
        }

        function search() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allRecords.filter(i => 
                (i.numero_nota && i.numero_nota.toString().includes(term)) ||
                (i.emitente_nf && i.emitente_nf.toLowerCase().includes(term)) ||
                (i.chave_nf_referencia && i.chave_nf_referencia.includes(term)) ||
                (i.transportadora_nome && i.transportadora_nome.toLowerCase().includes(term))
            );
            renderTable(filtered);
        }

        function renderCards() {
            const container = document.getElementById('summary-cards');
            const vin = allRecords.filter(i => i.status_geral === 'VINCULADO').length;
            const nf = allRecords.filter(i => i.status_geral.includes('Falta Frete')).length;
            const cte = allRecords.filter(i => i.status_geral.includes('Falta NF')).length;

            container.innerHTML = `
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <p class="text-xs font-bold text-slate-400 uppercase">Notas com Frete Pago</p>
                    <p class="text-3xl font-black text-green-600">${vin}</p>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <p class="text-xs font-bold text-slate-400 uppercase">Notas pendentes de Frete</p>
                    <p class="text-3xl font-black text-amber-500">${nf}</p>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                    <p class="text-xs font-bold text-slate-400 uppercase">Fretes sem Nota Localizada</p>
                    <p class="text-3xl font-black text-blue-500">${cte}</p>
                </div>
            `;
        }

        loadAllData();
    </script>
</body>
</html>

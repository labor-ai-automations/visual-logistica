<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uploader de XML para n8n</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 450px; text-align: center; }
        h2 { color: #333; margin-bottom: 20px; }
        input[type="text"] { width: 90%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px; font-size: 14px; }
        .file-upload { border: 2px dashed #007bff; padding: 30px; border-radius: 8px; cursor: pointer; background: #f9fbfd; transition: 0.2s; }
        .file-upload:hover { background: #e3f2fd; }
        .status-box { margin-top: 20px; text-align: left; max-height: 150px; overflow-y: auto; background: #222; color: #0f0; padding: 10px; border-radius: 5px; font-family: monospace; font-size: 12px; }
        button { background-color: #28a745; color: white; border: none; padding: 12px 25px; font-size: 16px; border-radius: 5px; cursor: pointer; margin-top: 15px; width: 100%; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        .progress { margin-top: 10px; font-weight: bold; color: #555; }
    </style>
</head>
<body>

<div class="container">
    <h2>🚀 Enviador de XML para n8n</h2>
    
    <label style="display:block; text-align:left; margin-bottom:5px; font-weight:bold;">URL do Webhook:</label>
    <input type="text" id="webhookUrl" placeholder="Cole a URL do n8n aqui..." value="">

    <div class="file-upload" onclick="document.getElementById('fileInput').click()">
        <p>📂 Clique para selecionar os XMLs</p>
        <span style="font-size: 12px; color: #666;">(Pode selecionar milhares de uma vez)</span>
    </div>
    <input type="file" id="fileInput" multiple accept=".xml" style="display: none;" onchange="updateCount()">

    <div class="progress" id="countDisplay">Nenhum arquivo selecionado</div>

    <button id="sendBtn" onclick="startUpload()">INICIAR ENVIO</button>

    <div class="status-box" id="log">
        Aguardando início...
    </div>
</div>

<script>
    function updateCount() {
        const input = document.getElementById('fileInput');
        document.getElementById('countDisplay').innerText = input.files.length + " arquivos selecionados.";
    }

    async function startUpload() {
        const files = document.getElementById('fileInput').files;
        const url = document.getElementById('webhookUrl').value;
        const log = document.getElementById('log');
        const btn = document.getElementById('sendBtn');

        if (files.length === 0) { alert("Selecione os arquivos primeiro!"); return; }
        if (!url) { alert("Coloque a URL do Webhook!"); return; }

        btn.disabled = true;
        btn.innerText = "ENVIANDO...";
        log.innerHTML = "";

        let sucessos = 0;
        let erros = 0;

        for (let i = 0; i < files.length; i++) {
            const file = files[i];
            
            try {
                const text = await file.text();
                
                // Estrutura igual a que você usava no PowerShell
                const payload = {
                    nome_arquivo: file.name,
                    xml_texto: text
                };

                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    sucessos++;
                    log.innerHTML = `[OK] ${file.name}<br>` + log.innerHTML;
                } else {
                    erros++;
                    log.innerHTML = `<span style="color:red">[ERRO] ${file.name} (Status ${response.status})</span><br>` + log.innerHTML;
                }

            } catch (err) {
                erros++;
                log.innerHTML = `<span style="color:red">[FALHA] ${file.name}</span><br>` + log.innerHTML;
            }

            document.getElementById('countDisplay').innerText = `Processando: ${i+1}/${files.length} | Sucessos: ${sucessos} | Erros: ${erros}`;
        }

        btn.disabled = false;
        btn.innerText = "ENVIAR NOVAMENTE";
        alert("Processo finalizado!");
    }
</script>

</body>
</html>
